name: Update Strava Data

on:
  schedule:
    # Runs every night at 2:00 AM UTC (~10 PM ET / 11 PM ET during DST)
    - cron: '0 2 * * *'
  # Lets you trigger it manually from the Actions tab, any time
  workflow_dispatch:

jobs:
  update-strava:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit strava.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Strava data
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python fetch_strava.py

      - name: Commit and push strava.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strava.json
          if git diff --staged --quiet; then
            echo "No changes to strava.json — skipping commit."
          else
            git commit -m "chore: update strava data [skip ci]"
            git push
          fi
