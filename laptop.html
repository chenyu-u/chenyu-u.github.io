<script type="module">
/**
 * 3D office landing — © 2026 Chenyu Li · MIT
 * Table on legs in an office room, window view from a user-supplied image,
 * Windows-11-style desktop on the laptop, canvas-textured real keyboard.
 */
import * as THREE from 'three';
import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

try {

/* ── Tunables ──────────────────────────────────────────────────────── */
const SCREEN_W = 30, SCREEN_H = 18.75;
const SCR_PX_W = 1280, SCR_PX_H = 800;
const LID_OPEN = -0.35, STAND_TILT = -0.12;      // lid verified in v0.2
/* ±66°. Was ±135°, which let the camera swing to z≈-92 — straight through
   the window wall and out of the room. cos(theta) must stay positive so
   the camera always remains in the front half. Containment PROVEN
   numerically for every phi/theta/radius extreme. */
const THETA0 = 0.0, THETA_RANGE = 0.75;
const PHI_MIN = 0.72, PHI_MAX = 1.40;   // up to banner (not straight up), down to desk
const ORBIT0 = { theta: 0, phi: 1.12, radius: 132 };   // default frames desk + laptop

/* Room shell. Floor sits under the table legs; the window wall is behind
   the laptop (-z). Camera max radius stays inside these bounds. */
const FLOOR_Y = -74, CEIL_Y = 150;   // desk sits 74 (≈74cm) above floor
const ROOM_HX = 170;             // half width  (walls at ±170)
const WALL_BACK_Z = -62, WALL_FRONT_Z = 280;   // extra depth so you can pull back further
const WIN = { cx: -6, w: 128, y0: 4, y1: 92 };   // window opening in back wall

const LINKS = {
  linkedin:  'https://linkedin.com/in/li-chenyu',
  github:    'https://github.com/chenyu-u',
  maps:      'map.html',            // full-screen travel map (same data as the site)
  portfolio: 'index.html',
};

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const NAVY=0x002A5C, BLUE=0x1668C2;

/* ── Renderers ─────────────────────────────────────────────────────── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xEDEAE4);

const camera = new THREE.PerspectiveCamera(40, 1, 0.5, 2000);
camera.up.set(0, 1, 0);

const cssRenderer = new CSS3DRenderer();
document.getElementById('css3d').appendChild(cssRenderer.domElement);

const glRenderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
glRenderer.setClearColor(0x000000, 0);
/* Filmic tone mapping + correct color space is the single biggest step from
   "flat 3D" toward "photographed room" — it rolls off highlights and
   deepens shadows the way a camera does instead of clipping to pure white. */
glRenderer.toneMapping = THREE.ACESFilmicToneMapping;
glRenderer.toneMappingExposure = 1.0;
glRenderer.outputColorSpace = THREE.SRGBColorSpace;
glRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
glRenderer.shadowMap.enabled = true;
glRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('webgl').appendChild(glRenderer.domElement);

// Golden-hour fill matched to the Busan harbour photo: a warm peach sky tone
// from above, cool blue-grey bounce from below (the water/shadow side).
scene.add(new THREE.HemisphereLight(0xFAD9B0, 0x6E7E92, 0.5));
scene.add(new THREE.AmbientLight(0xFFE9CE, 0.16));                 // warm lift in the shadows

/* A soft ceiling fixture over the desk (see the fixture mesh later). */
const ceilingLight = new THREE.PointLight(0xFFEAC6, 34, 220, 2);
ceilingLight.position.set(0, CEIL_Y - 14, 20);
ceilingLight.castShadow = true;
ceilingLight.shadow.mapSize.set(1024, 1024);
scene.add(ceilingLight);
/* Daylight pouring in through the window (from -z, slightly high/left). */
// Low, warm setting sun raking in through the window, like the photo. Warmer
// colour and a lower angle so the light comes across the room, not straight down.
const daylight = new THREE.DirectionalLight(0xFFCE8A, 1.5);
daylight.position.set(WIN.cx + 40, 60, WALL_BACK_Z - 80);
daylight.target.position.set(-10, 8, 30);
daylight.castShadow = true;
daylight.shadow.mapSize.set(2048, 2048);
daylight.shadow.bias = -0.0004;
daylight.shadow.normalBias = 0.6;
Object.assign(daylight.shadow.camera, { left:-140, right:140, top:140, bottom:-140, far:600 });
scene.add(daylight, daylight.target);

/* ── The room ──────────────────────────────────────────────────────── */
const wallMat  = new THREE.MeshStandardMaterial({ color: 0xF2EFE9, roughness:.98 });   // warm off-white, not pure
const floorMat = new THREE.MeshStandardMaterial({ color: 0x7C5F42, roughness:.55, metalness:.05 });  // engineered wood
const trimMat  = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness:.9 });

const floor = new THREE.Mesh(new THREE.BoxGeometry(ROOM_HX*2, 2, WALL_FRONT_Z - WALL_BACK_Z), floorMat);
floor.position.set(0, FLOOR_Y - 1, (WALL_BACK_Z + WALL_FRONT_Z)/2);
floor.receiveShadow = true;
scene.add(floor);

const ceil = new THREE.Mesh(new THREE.BoxGeometry(ROOM_HX*2, 2, WALL_FRONT_Z - WALL_BACK_Z), trimMat);
ceil.position.set(0, CEIL_Y + 1, (WALL_BACK_Z + WALL_FRONT_Z)/2);
scene.add(ceil);

/* Back wall built as four slabs around the window opening. */
{
  const T = 3, H = CEIL_Y - FLOOR_Y;
  const x0 = WIN.cx - WIN.w/2, x1 = WIN.cx + WIN.w/2;
  const seg = (w, h, x, y) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, T), wallMat);
    m.position.set(x, y, WALL_BACK_Z);
    m.receiveShadow = true;
    scene.add(m);
  };
  seg(x0 - (-ROOM_HX), H, (x0 + -ROOM_HX)/2, FLOOR_Y + H/2);            // left of window
  seg(ROOM_HX - x1,    H, (x1 + ROOM_HX)/2,  FLOOR_Y + H/2);            // right of window
  seg(WIN.w, WIN.y0 - FLOOR_Y, WIN.cx, (FLOOR_Y + WIN.y0)/2);           // below sill
  seg(WIN.w, CEIL_Y - WIN.y1,  WIN.cx, (WIN.y1 + CEIL_Y)/2);           // above header
}

/* Window frame + mullions */
{
  const frameM = new THREE.MeshStandardMaterial({ color: 0x3A4552, roughness:.5, metalness:.3 });
  const fz = WALL_BACK_Z + 0.5, t = 2.2, d = 2.6;
  const mk = (w,h,x,y) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), frameM);
    m.position.set(x,y,fz); m.castShadow = true; scene.add(m);
  };
  mk(WIN.w + t*2, t, WIN.cx, WIN.y1 + t/2);
  mk(WIN.w + t*2, t, WIN.cx, WIN.y0 - t/2);
  mk(t, WIN.y1 - WIN.y0, WIN.cx - WIN.w/2 - t/2, (WIN.y0+WIN.y1)/2);
  mk(t, WIN.y1 - WIN.y0, WIN.cx + WIN.w/2 + t/2, (WIN.y0+WIN.y1)/2);
  const sill = new THREE.Mesh(new THREE.BoxGeometry(WIN.w + 10, 2, 7), trimMat);
  sill.position.set(WIN.cx, WIN.y0 - 1, WALL_BACK_Z + 3.4);
  sill.castShadow = sill.receiveShadow = true; scene.add(sill);
}

/* THE VIEW — your photo behind the glass, as a CSS3D <img>.
   DOM images render from anywhere — including file:// — unlike WebGL
   textures, which browsers block for local files. A NoBlending "hole"
   plane in the window opening lets it show through, exactly the same
   trick as the laptop screen; the frame and walls still occlude it. */
const VIEW_PX_W = 1280, VIEW_PX_H = 880;
const viewEl = document.createElement('div');
viewEl.style.cssText = `width:${VIEW_PX_W}px;height:${VIEW_PX_H}px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(#7FA3CF,#DCE9F5);color:#1F3B5C;
  font:700 42px/1.5 system-ui,sans-serif`;
viewEl.innerHTML = 'Add  window-view.jpg  next to laptop.html<br>' +
  '<span style="font-size:26px;font-weight:400">(Windows hides extensions — the file may really be window-view.jpg.jpg)</span>';
{
  const names = ['window-view.jpg', 'window-view.jpeg', 'window-view.png',
                 'window-view.jpg.jpg', 'window-view.JPG', 'busan.jpg'];
  (function tryImg(i) {
    if (i >= names.length) {
      console.warn('[office] no window-view image found. Tried: ' + names.join(', '));
      return;
    }
    const im = new Image();
    im.onload = () => {
      viewEl.innerHTML = '';
      im.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
      viewEl.appendChild(im);
      console.info('[office] window view loaded from ' + names[i]);
    };
    im.onerror = () => tryImg(i + 1);
    im.src = names[i];
  })(0);
}
const viewObj = new CSS3DObject(viewEl);
viewObj.position.set(WIN.cx, (WIN.y0 + WIN.y1) / 2, WALL_BACK_Z - 1.5);
viewObj.scale.setScalar((WIN.w * 1.08) / VIEW_PX_W);  // slight overscan hides the reveal
scene.add(viewObj);
/* The see-through hole, sized to the opening, sitting in the wall plane. */
const winHole = new THREE.Mesh(
  new THREE.PlaneGeometry(WIN.w, WIN.y1 - WIN.y0),
  new THREE.MeshBasicMaterial({ color: 0x000000, opacity: 0, transparent: false,
                                blending: THREE.NoBlending, side: THREE.DoubleSide }));
winHole.position.set(WIN.cx, (WIN.y0 + WIN.y1) / 2, WALL_BACK_Z + 0.2);
scene.add(winHole);

/* Side walls + posters */
for (const sx of [-1, 1]) {
  const w = new THREE.Mesh(new THREE.BoxGeometry(3, CEIL_Y - FLOOR_Y, WALL_FRONT_Z - WALL_BACK_Z), wallMat);
  w.position.set(sx * ROOM_HX, (FLOOR_Y + CEIL_Y)/2, (WALL_BACK_Z + WALL_FRONT_Z)/2);
  w.receiveShadow = true; scene.add(w);
}
{ // front wall behind the viewer, so the 270° sweep never faces void
  const w = new THREE.Mesh(new THREE.BoxGeometry(ROOM_HX*2, CEIL_Y - FLOOR_Y, 3), wallMat);
  w.position.set(0, (FLOOR_Y + CEIL_Y)/2, WALL_FRONT_Z);
  scene.add(w);
}
/* Four certificate frames on the BACK wall, flanking the window, where the
   camera actually looks. Rendered as CSS3D <img>s so they load over file://
   too. Each is clickable — opens the full certificate in a new tab. The dark
   frame + matte sit BEHIND the photo (larger z-offset) so the image is never
   covered; a NoBlending hole keeps the wall from bleeding through. */
const CERT_W = 30, CERT_H = 23, CERT_PX_W = 660, CERT_PX_H = 510;
const frameMat = new THREE.MeshStandardMaterial({ color: 0x2A2016, roughness:.55 });
const matteMat = new THREE.MeshStandardMaterial({ color: 0xF3EFE7, roughness:.9 });
const certObjs = [];   // for raycasting

/* [x on back wall, y, number] — two low on each side of the window, two high */
const CERTS = [
  [-110, 40, 1], [-110, 78, 2],
  [ 100, 40, 3], [ 100, 78, 4],
];
for (const [cx, cy, num] of CERTS) {
  const zWall = WALL_BACK_Z;                 // back wall plane
  // frame + matte BEHIND the image
  const fr = new THREE.Mesh(new THREE.BoxGeometry(CERT_W + 6, CERT_H + 6, 1.4), frameMat);

  const el = document.createElement('div');
  el.style.cssText = `width:${CERT_PX_W}px;height:${CERT_PX_H}px;overflow:hidden;cursor:pointer;
    display:flex;align-items:center;justify-content:center;text-align:center;

  el.innerHTML = `Certificate ${num}<br><span style="font-size:21px;font-weight:400">` +
    `add certificate-${num}.jpg</span>`;

  let foundSrc = null;
  (function loadCert(cands, i) {
    if (i >= cands.length) {
      console.warn(`[office] certificate-${num}: none of ${cands.join(', ')} loaded.`);
      return;

    const im = new Image();
    im.onload = () => {
      foundSrc = cands[i];

      el.innerHTML = '';
      im.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;pointer-events:none';
      el.appendChild(im);
      console.info(`[office] certificate-${num} loaded from ${cands[i]}`);
    };
    im.onerror = () => loadCert(cands, i + 1);
    im.src = cands[i];
  })([`certificate-${num}.jpg`, `certificate-${num}.jpeg`, `certificate-${num}.png`,
      `certificate-${num}.JPG`], 0);

  const obj = new CSS3DObject(el);
  obj.position.set(cx, cy, zWall + 2.4);     // in front of the matte
  obj.scale.setScalar(CERT_H / CERT_PX_H);
  scene.add(obj);

  // see-through hole so the WebGL wall doesn't paint over the CSS layer;
  // also the raycast target for clicking the certificate.
  const chole = new THREE.Mesh(
    new THREE.PlaneGeometry(CERT_W, CERT_H),
    new THREE.MeshBasicMaterial({ color:0, opacity:0, transparent:false,
                                  blending: THREE.NoBlending, side: THREE.DoubleSide }));
  chole.position.set(cx, cy, zWall + 2.2);
  chole.userData.cert = num;
  scene.add(chole);

}

/* ── Real keyboard: full layout drawn to a canvas texture ──────────── */
function keyboardTexture() {
  const W = 2048, H = 900, c = document.createElement('canvas');
  c.width = W; c.height = H;
  const g = c.getContext('2d');
  g.fillStyle = '#10151B'; g.fillRect(0, 0, W, H);          // deck well

  const rows = [
    // [ [label, widthUnits], ... ]  — a standard 60%+fn laptop layout
    [['esc',1.3],['F1',1],['F2',1],['F3',1],['F4',1],['F5',1],['F6',1],['F7',1],['F8',1],['F9',1],['F10',1],['F11',1],['F12',1],['del',1.3]],
    [['`',1],['1',1],['2',1],['3',1],['4',1],['5',1],['6',1],['7',1],['8',1],['9',1],['0',1],['-',1],['=',1],['⌫',1.7]],
    [['tab',1.6],['Q',1],['W',1],['E',1],['R',1],['T',1],['Y',1],['U',1],['I',1],['O',1],['P',1],['[',1],[']',1],['\\',1.1]],
    [['caps',1.9],['A',1],['S',1],['D',1],['F',1],['G',1],['H',1],['J',1],['K',1],['L',1],[';',1],["'",1],['enter ⏎',2]],
    [['shift',2.4],['Z',1],['X',1],['C',1],['V',1],['B',1],['N',1],['M',1],[',',1],['.',1],['/',1],['shift',2.4]],
    [['ctrl',1.3],['fn',1.1],['⊞',1.1],['alt',1.1],['',6.4],['alt',1.1],['ctrl',1.1],['◄',1],['▲▼',1],['►',1]],
  ];

  const PAD = 44, GAP = 10, ROW_H = (H - PAD*2 - GAP*5) / 6;
  let y = PAD;
  for (const row of rows) {
    const units = row.reduce((s, k) => s + k[1], 0);
    const unitW = (W - PAD*2 - GAP*(row.length-1)) / units;
    let x = PAD;
    for (const [label, u] of row) {
      const kw = unitW * u;
      // key cap
      g.fillStyle = '#232C36';
      g.beginPath(); g.roundRect(x, y, kw, ROW_H, 9); g.fill();
      g.fillStyle = '#2B3541';
      g.beginPath(); g.roundRect(x+3, y+2, kw-6, ROW_H-8, 7); g.fill();
      // legend
      if (label) {
        g.fillStyle = '#C9D3DE';
        const small = label.length > 2;
        g.font = (small ? 26 : 34) + 'px "Segoe UI", system-ui, sans-serif';
        g.textAlign = label.length === 1 ? 'left' : 'center';
        g.textBaseline = label.length === 1 ? 'top' : 'middle';
        if (label.length === 1) g.fillText(label, x + 12, y + 10);
        else g.fillText(label, x + kw/2, y + ROW_H/2);
      }
      x += kw + GAP;
    }
    y += ROW_H + GAP;
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

});

/* ══ CABLE MANAGEMENT — routed to a power bar on the window wall ═════
   Laptop and lamp cables run to the BACK edge of the desk, down the back
   leg, then along the floor to a power bar sitting against the window
   (back) wall. The bar is fed by an outlet on that wall above it. Cables
   hug surfaces, stay clear of the 3D printer, and nothing floats. */
{
  const cableM = new THREE.MeshStandardMaterial({ color: 0x15171B, roughness:.9 });
  const stripM = new THREE.MeshStandardMaterial({ color: 0xECECEE, roughness:.5 });
  const plateM = new THREE.MeshStandardMaterial({ color: 0xF4F1EB, roughness:.7 });
  const up = new THREE.Vector3(0,1,0), dir = new THREE.Vector3();
  const V = (x,y,z)=>new THREE.Vector3(x,y,z);
  function run(pts, r=0.5){                // polyline cable hugging surfaces
    for(let i=0;i<pts.length-1;i++){
      dir.subVectors(pts[i+1],pts[i]); const len=dir.length();
      if(len<0.01) continue;
      const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,6),cableM);
      m.position.copy(pts[i]).add(pts[i+1]).multiplyScalar(0.5);
      m.quaternion.setFromUnitVectors(up,dir.clone().normalize());
      scene.add(m);
    }
  }

  const BW = WALL_BACK_Z;                  // window/back wall plane z=-62
  const bz = BW + 6;                       // bar sits just off the wall
  const BARX = 78;                         // right of the window, clear of the view
  const BARY = FLOOR_Y + 4;                // bar body centre height

  // --- power strip: a raised white body with recessed sockets on top ---
  const bar = new THREE.Group();
  const barBody = new THREE.Mesh(new THREE.BoxGeometry(64, 8, 12), stripM);
  barBody.castShadow = barBody.receiveShadow = true; bar.add(barBody);
  // rounded dark end caps
  for (const sx of [-1, 1]) {
    const cap = new THREE.Mesh(new THREE.BoxGeometry(2, 8.4, 12.4),
      new THREE.MeshStandardMaterial({ color: 0x2A2D33, roughness:.6 }));
    cap.position.set(sx * 32, 0, 0); bar.add(cap);
  }
  // six recessed socket wells on the top face
  const SOCK = [-25, -15, -5, 5, 15, 25];
  for (const sx of SOCK) {
    const well = new THREE.Mesh(new THREE.BoxGeometry(7, 1.2, 8),
      new THREE.MeshStandardMaterial({ color: 0x3A3D42, roughness:.7 }));
    well.position.set(sx, 4, 0); bar.add(well);
    // two slots in each socket
    for (const dz of [-1.4, 1.4]) {
      const slot = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 2.4),
        new THREE.MeshStandardMaterial({ color: 0x0B0C0E }));
      slot.position.set(sx, 4.5, dz); bar.add(slot);
    }
  }
  // power indicator + its own cable to the wall outlet
  const led = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.6, 12),
    new THREE.MeshStandardMaterial({ color: 0x37C878, emissive: 0x1C7A44, emissiveIntensity:.9 }));
  led.rotation.x = Math.PI/2; led.position.set(-30, 2, 6.1); bar.add(led);
  bar.position.set(BARX, BARY, bz); scene.add(bar);

  // --- wall outlet above the bar, with the strip's own plug seated in it ---
  const outlet = new THREE.Group();
  outlet.add(new THREE.Mesh(new THREE.BoxGeometry(8, 12, 0.8), plateM));
  for (const oy of [-2.6, 2.6]) {
    const face = new THREE.Mesh(new THREE.BoxGeometry(5, 4, 0.4),
      new THREE.MeshStandardMaterial({ color: 0xDAD6CE, roughness:.6 }));
    face.position.set(0, oy, 0.5); outlet.add(face);
    for (const dx of [-1, 1]) {
      const slot = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.4, 0.4),
        new THREE.MeshStandardMaterial({ color: 0x0B0C0E }));
      slot.position.set(dx, oy + 0.3, 0.6); outlet.add(slot);
    }
  }
  outlet.position.set(BARX, FLOOR_Y + 30, BW + 1.5); scene.add(outlet);
  // the strip's plug seated in the LOWER outlet socket
  const wallPlug = new THREE.Mesh(new THREE.BoxGeometry(5.4, 4, 3.2),
    new THREE.MeshStandardMaterial({ color: 0xF3F3F0, roughness:.5 }));
  wallPlug.position.set(BARX, FLOOR_Y + 27.4, BW + 3.2); wallPlug.castShadow = true; scene.add(wallPlug);
  // cord from that plug down the wall into the strip
  run([ V(BARX, FLOOR_Y + 25.4, bz), V(BARX, BARY + 5, bz), V(BARX, BARY + 4, bz) ], 0.5);

  const dz = -41;                          // desk back edge

  /* A plug that SEATS into a socket well on the strip: a moulded body sitting
     in the well with the cable exiting the top, styled per device. Returns the
     point where the device cable joins the plug. */
  function plugAt(sockX, kind) {
    const wx = BARX + sockX, wy = BARY + 4.5, wz = bz;   // top of that socket well
    const g = new THREE.Group();
    let col = 0x15171B, w = 5, h = 4.5, d = 6;
    if (kind === 'brick') { col = 0xF3F3F0; w = 6; h = 5.5; d = 8; }   // white laptop brick
    else if (kind === 'wart')  { col = 0x1B1D22; w = 4.5; h = 4.5; d = 5.5; }
    else if (kind === 'slim')  { col = 0x111318; w = 4;   h = 3.6; d = 4; }
    else /* earth */           { col = 0x14161A; w = 5;   h = 5;   d = 4.5; }
    const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
      new THREE.MeshStandardMaterial({ color: col, roughness:.55 }));
    body.position.set(0, h/2 - 0.6, 0);      // sink slightly into the well
    body.castShadow = true; g.add(body);
    // strain-relief neck where the cable exits the top-back of the plug
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 2.2, 8),
      new THREE.MeshStandardMaterial({ color: 0x15171B, roughness:.9 }));
    neck.position.set(0, h - 0.4, -d/2 + 0.6); g.add(neck);
    g.position.set(wx, wy, wz); scene.add(g);
    return new THREE.Vector3(wx, wy + h - 0.4, wz - d/2 + 0.6);
  }

  // one plug per device, each in its own socket well (all six get used/visible)
  const pLaptop = plugAt(-25, 'brick');
  const pLamp   = plugAt(-5,  'wart');
  const pSound  = plugAt(5,   'slim');
  const pPrint  = plugAt(25,  'earth');

  // --- laptop charger: plug at left-rear of laptop, with a little slack, to
  //     the back desk edge, down the back-left leg, to its plug on the strip ---
  run([
    V(-22.6,10,-11),                                // exits the laptop
    V(-24,7.5,-13), V(-24,5,-11), V(-23,2.5,-13),   // a loose slack loop hanging off the port
    V(-22.6,0.6,dz+4), V(-25,0.5,dz),               // relaxed drop onto the desk, not taut
    V(-42,0.7,dz), V(-58,0.5,dz),                   // gentle waviness along the back edge
    V(-68,0.4,dz), V(-68,FLOOR_Y+5,dz),
    V(-68,FLOOR_Y+3,dz), V(-68,FLOOR_Y+3,bz),
    V(BARX-30,FLOOR_Y+3,bz), pLaptop
  ],0.42);

  // --- desk lamp: from the clamp on the right desk edge, back to the desk
  //     edge, down the back-right leg, to its plug on the strip ---
  run([
    V(70,1,-6), V(70,0.4,-22), V(70,0.4,dz),
    V(68,0.4,dz), V(68,FLOOR_Y+5,dz),
    V(68,FLOOR_Y+3,dz), V(68,FLOOR_Y+3,bz), pLamp
  ],0.42);

  // --- soundbar: straight down the window wall into its plug ---
  run([
    V(WIN.cx+40,WIN.y0-1,BW+7), V(WIN.cx+40,FLOOR_Y+3,BW+5),
    V(BARX+5,FLOOR_Y+3,bz), pSound
  ],0.42);

  // --- 3D printer: from the back of the printer along the wall to its plug ---
  run([
    V(120,FLOOR_Y+4,1), V(120,FLOOR_Y+3,bz), V(BARX+25,FLOOR_Y+3,bz), pPrint
  ],0.5);
}

/* Bambu-Lab-style printer to match the reference: dark grey enclosure with a
   glass front, a black control-panel band across the top, and an AMS on top
   where four spools stand upright inside a curved translucent hood. Grey/white
   body, UofT-coloured filament. On the floor to the right. */
{
  const bodyM  = new THREE.MeshStandardMaterial({ color: 0xF0F0F2, roughness:.45, metalness:.15 });  // white body
  const panelM = new THREE.MeshStandardMaterial({ color: 0x2A2D33, roughness:.5, metalness:.35 });  // dark grey panel
  const lightM = new THREE.MeshStandardMaterial({ color: 0xC7CACE, roughness:.5, metalness:.2 });  // light grey trim
  const glassM = new THREE.MeshStandardMaterial({ color: 0x11161B, roughness:.08, metalness:.2,
                                                  transparent:true, opacity:.42 });
  const hoodM  = new THREE.MeshStandardMaterial({ color: 0x2A2D33, roughness:.2, metalness:.1,
                                                  transparent:true, opacity:.38 });
  const p = new THREE.Group();
  p.position.set(120, FLOOR_Y, 20);
  const S = 38, wallT = 1.2;
  const mkFace = (w,h,d,x,y,z,m) => { const f=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
    f.position.set(x,y,z); f.castShadow=f.receiveShadow=true; p.add(f); return f; };

  // --- lower print enclosure ---
  const EH = S;                                    // enclosure height
  mkFace(S, wallT, S, 0, 2, 0, bodyM);             // floor
  mkFace(wallT, EH, S, -S/2, 2+EH/2, 0, bodyM);    // left
  mkFace(wallT, EH, S,  S/2, 2+EH/2, 0, bodyM);    // right
  mkFace(S, EH, wallT, 0, 2+EH/2, -S/2, bodyM);    // back
  mkFace(S, EH, 0.5,   0, 2+EH/2,  S/2, glassM);   // glass front door
  // door frame + handle
  mkFace(S, 1.4, 0.8, 0, 2, S/2+0.3, panelM);      // bottom door rail
  mkFace(1.6, 5, 0.8, S/2-5, 2+EH/2, S/2+0.4, lightM);  // handle

  // interior: bed + gantry + toolhead (visible through glass)
  mkFace(S-8, 1, S-8, 0, 7, 0, new THREE.MeshStandardMaterial({ color:0x14161A, roughness:.7 }));
  const gantry = new THREE.Mesh(new THREE.BoxGeometry(S-4, 1.6, 3),
    new THREE.MeshStandardMaterial({ color: 0x2C3138, roughness:.4, metalness:.5 }));
  gantry.position.set(0, 2+EH-9, 0); p.add(gantry);
  const head = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 4), panelM);
  head.position.set(3, 2+EH-11, 0); p.add(head);

  // --- black control-panel band across the TOP of the enclosure ---
  const PB = 8;                                    // panel band height
  mkFace(S+1, PB, S+1, 0, 2+EH+PB/2, 0, panelM);
  // little round camera + status light on the panel front
  const cam = new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.1,0.6,16), lightM);
  cam.rotation.x = Math.PI/2; cam.position.set(-S/2+7, 2+EH+PB/2, S/2+0.6); p.add(cam);
  const statusLed = new THREE.Mesh(new THREE.BoxGeometry(3,0.8,0.4),
    new THREE.MeshStandardMaterial({ color:0x37C878, emissive:0x1C7A44, emissiveIntensity:.8 }));
  statusLed.position.set(-S/2+13, 2+EH+PB/2, S/2+0.6); p.add(statusLed);
  // control touchscreen on the panel, right side
  const scr = new THREE.Mesh(new THREE.BoxGeometry(7, 4.4, 0.4),
    new THREE.MeshStandardMaterial({ color: 0x1B9BC4, roughness:.25, emissive:0x0C5567, emissiveIntensity:.7 }));
  scr.position.set(S/2-8, 2+EH+PB/2, S/2+0.6); p.add(scr);

  // --- AMS on top, matching the reference: four spools sit side by side in a
  //     dark base with dividers between them, turned so you see each spool's
  //     curved tread from the front, under a snug curved translucent lid. ---
  const amsY = 2+EH+PB;                             // sits on the panel band
  const SP_R = 6.5, SP_T = 7.5;                     // spool radius / thickness
  const SP_Y = amsY + 8;                            // spool centre height
  const SP_X = [-13.5, -4.5, 4.5, 13.5];            // four positions across

  // solid dark base the spools sit down into (hides their lower halves)
  const amsBase = new THREE.Mesh(new THREE.BoxGeometry(S, 8, 16), panelM);
  amsBase.position.y = amsY + 4; amsBase.castShadow = true; p.add(amsBase);

  const spoolCols = [0x002A5C, 0x1668C2, 0xFFFFFF, 0x8B9BB0];   // UofT navy, blue, white, cool grey
  spoolCols.forEach((col, i) => {
    const x = SP_X[i];
    // the filament winding: axis LEFT-RIGHT so the curved tread faces the room
    const wind = new THREE.Mesh(new THREE.CylinderGeometry(SP_R - 0.5, SP_R - 0.5, SP_T, 30),

    wind.rotation.z = Math.PI/2;
    wind.position.set(x, SP_Y, 0); wind.castShadow = true; p.add(wind);
    // spool side flanges (clear-ish plastic discs either side of the winding)
    for (const sx of [-1, 1]) {

    }

    const hub = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, SP_T + 0.8, 14),
      new THREE.MeshStandardMaterial({ color: 0x1A1C20, roughness:.5 }));
    hub.rotation.z = Math.PI/2; hub.position.set(x, SP_Y, 0); p.add(hub);
  });

  // dark dividers between and outside the spools
  for (const dx of [-18, -9, 0, 9, 18]) {
    const div = new THREE.Mesh(new THREE.BoxGeometry(0.8, 13, 14), panelM);
    div.position.set(dx, SP_Y, 0); p.add(div);
  }

  // snug curved translucent lid arching over the spool tops
  const hood = new THREE.Mesh(
    new THREE.CylinderGeometry(SP_R + 1.4, SP_R + 1.4, S - 2, 28, 1, true, 0, Math.PI),
    hoodM);
  hood.rotation.z = Math.PI/2;                      // axis left-right, covers the top half
  hood.position.set(0, SP_Y, 0); p.add(hood);
  // lid end caps
  for (const sx of [-1, 1]) {

    capH.rotation.y = Math.PI/2 * sx;

  }
  // thin rim along the front edge of the lid
  const lidRim = new THREE.Mesh(new THREE.BoxGeometry(S - 2, 0.8, 0.8),
    new THREE.MeshStandardMaterial({ color: 0x2A2D33, roughness:.5, metalness:.3 }));
  lidRim.position.set(0, SP_Y, SP_R + 1.4); p.add(lidRim);

  // PTFE tubes leaving each spool and dropping into the panel
  SP_X.forEach(x => {
    const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 7, 8),
      new THREE.MeshStandardMaterial({ color: 0xDDE2E6, roughness:.6 }));
    tube.position.set(x, amsY - 1.5, 5); p.add(tube);
  });

  scene.add(p);
}

/* Floor-to-ceiling bookshelves on both side walls with a glass enclosure.
   Each book is a labelled spine (title drawn to a shared canvas texture)
   with real STEM / aerospace / finance / robotics titles. */
function bookSpineTexture(title, bg, fg) {
  const W = 128, H = 512, c = document.createElement('canvas');
  c.width = W; c.height = H;
  const g = c.getContext('2d');
  g.fillStyle = bg; g.fillRect(0, 0, W, H);
  // subtle top/bottom bands like a real cover
  g.fillStyle = 'rgba(255,255,255,.14)'; g.fillRect(0, 24, W, 6); g.fillRect(0, H-30, W, 6);
  g.save();
  g.translate(W/2, H/2); g.rotate(-Math.PI/2);
  g.fillStyle = fg; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.font = '600 30px Archivo, system-ui, sans-serif';
  // wrap long titles across a couple of lines along the spine
  const words = title.split(' '); const lines = []; let cur = '';
  for (const w of words) { if ((cur+' '+w).length > 16) { lines.push(cur); cur = w; } else cur = cur ? cur+' '+w : w; }
  if (cur) lines.push(cur);
  const lh = 34, y0 = -(lines.length-1)*lh/2;
  lines.forEach((ln,i)=> g.fillText(ln, 0, y0 + i*lh));
  g.restore();
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 8;
  return t;
}

    back.position.set(wallX - sx*0.5, SHELF_BOTTOM + TOTAL_H/2, bz);

    // side dividers full height

      const side = new THREE.Mesh(new THREE.BoxGeometry(DEPTH, TOTAL_H, 1.4), woodM);
      side.position.set(faceX, SHELF_BOTTOM + TOTAL_H/2, bz + s2*UNIT_W/2);
      side.castShadow = true; shelf.add(side);
    }
    // shelf boards + books
    for (let lvl = 0; lvl <= LEVELS; lvl++) {
      const y = SHELF_BOTTOM + lvl * (TOTAL_H/LEVELS);
      const board = new THREE.Mesh(new THREE.BoxGeometry(DEPTH, 1.4, UNIT_W), woodM);
      board.position.set(faceX, y, bz); board.castShadow = board.receiveShadow = true; shelf.add(board);
      if (lvl < LEVELS) {
        let bx = bz - UNIT_W/2 + 3;
        while (bx < bz + UNIT_W/2 - 4) {
          const bw = 2.4 + Math.random()*1.6;          // spine thickness

          const mat = bookMats[pick % bookMats.length]; pick++;
          const book = new THREE.Mesh(new THREE.BoxGeometry(DEPTH*0.62, bh, bw), mat);
          book.position.set(faceX - sx*1.2, y + 0.7 + bh/2, bx + bw/2);
          book.rotation.y = sx < 0 ? 0 : Math.PI;      // title faces into the room
          book.castShadow = true; shelf.add(book);
          bx += bw + 0.25;

    // see-through glass door across the front of each bay
    const glass = new THREE.Mesh(new THREE.BoxGeometry(0.6, TOTAL_H - 2, UNIT_W - 1), glassM);
    glass.position.set(faceX - sx*(DEPTH/2 - 0.5), SHELF_BOTTOM + TOTAL_H/2, bz);
    shelf.add(glass);
    // thin frame around the glass
    const frameM = new THREE.MeshStandardMaterial({ color: 0x2C2620, roughness:.5, metalness:.3 });
    for (const [h,w,yy,zz] of [[TOTAL_H,2,SHELF_BOTTOM+TOTAL_H/2,bz-UNIT_W/2],

        frameM); bar.position.set(faceX - sx*(DEPTH/2-0.5), yy, zz); shelf.add(bar);
    }
  }
  scene.add(shelf);
}

const lamp = new THREE.Group();
{
  // A clamp-mounted architect lamp, built so it actually holds up: it grips the
  // right edge of the desk with a C-clamp (which carries the load), a lower arm
  // rises up and toward the desk, an elbow folds the upper arm BACK and down so
  // the head hangs over the work area. Because it's clamped, the reach doesn't
  // need a heavy base to balance it. Mechanical look: exposed pivots, bolts,
  // brass ribs, brushed metal.
  const metalM = new THREE.MeshStandardMaterial({ color: 0x3C4149, roughness:.35, metalness:.85 });
  const brassM = new THREE.MeshStandardMaterial({ color: 0xB08A3E, roughness:.35, metalness:.9 });
  const glowM  = new THREE.MeshStandardMaterial({ color: 0xFFF3DC, roughness:.3,
                   emissive:0xFFE6B0, emissiveIntensity:1.8 });
  const bolt = (x,y,z) => { const b=new THREE.Mesh(new THREE.CylinderGeometry(0.85,0.85,0.5,6),brassM);
    b.rotation.x=Math.PI/2; b.position.set(x,y,z); lamp.add(b); };
  const armBox = (x0,y0,x1,y1,w) => {   // a bar spanning two points in the x-y plane
    const dx=x1-x0, dy=y1-y0, len=Math.hypot(dx,dy);
    const m=new THREE.Mesh(new THREE.BoxGeometry(len, w, w), metalM);
    m.position.set((x0+x1)/2,(y0+y1)/2,0); m.rotation.z=Math.atan2(dy,dx);
    m.castShadow=true; lamp.add(m);
    const rib=new THREE.Mesh(new THREE.BoxGeometry(len-4, w*0.35, w*0.35), brassM);
    rib.position.copy(m.position); rib.rotation.z=m.rotation.z; lamp.add(rib);
    return m;
  };

  // C-CLAMP gripping the desk edge (desk top is at y=0 in lamp-local terms after
  // the group offset below). Jaws above and below the desk lip.
  const clampBody = new THREE.Mesh(new THREE.BoxGeometry(3, 10, 5), metalM);
  clampBody.position.set(0, 0, 0); clampBody.castShadow = true; lamp.add(clampBody);
  const jawTop = new THREE.Mesh(new THREE.BoxGeometry(7, 2, 5), metalM);
  jawTop.position.set(-2, 4.5, 0); lamp.add(jawTop);
  const jawBot = new THREE.Mesh(new THREE.BoxGeometry(7, 2, 5), metalM);
  jawBot.position.set(-2, -4.5, 0); lamp.add(jawBot);
  const screw = new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,4,10), brassM);
  screw.position.set(-4, -4.5, 0); lamp.add(screw);
  const knob = new THREE.Mesh(new THREE.SphereGeometry(1.4,12,10), brassM);
  knob.position.set(-4, -7, 0); lamp.add(knob);

  // base pivot on top of the clamp
  const p0x=0, p0y=6;
  const knuckle0 = new THREE.Mesh(new THREE.CylinderGeometry(2,2,3,18), metalM);
  knuckle0.rotation.z=Math.PI/2; knuckle0.position.set(p0x,p0y,0); lamp.add(knuckle0);
  bolt(p0x,p0y,1.6); bolt(p0x,p0y,-1.6);

  // LOWER ARM: up and slightly toward the desk (to the left, -x)
  const elx=-12, ely=34;                   // elbow position (raised a little)
  armBox(p0x,p0y, elx,ely, 2.4);
  const elbow = new THREE.Mesh(new THREE.CylinderGeometry(2.4,2.4,3.2,18), metalM);
  elbow.rotation.z=Math.PI/2; elbow.position.set(elx,ely,0); elbow.castShadow=true; lamp.add(elbow);
  bolt(elx,ely,1.7); bolt(elx,ely,-1.7);

  // UPPER ARM: folds BACK and DOWN so the head hangs over the desk. It reaches
  // further left and comes down to the head height above the work area.
  const hx=-30, hy=28;                     // head joint (higher, gentler fold)
  armBox(elx,ely, hx,hy, 2.0);
  const headJoint = new THREE.Mesh(new THREE.CylinderGeometry(1.9,1.9,2.6,16), metalM);
  headJoint.rotation.z=Math.PI/2; headJoint.position.set(hx,hy,0); lamp.add(headJoint);
  bolt(hx,hy,1.3); bolt(hx,hy,-1.3);

  // HEAD: a cylindrical housing pointing straight down at the desk
  const head = new THREE.Group();
  head.position.set(hx,hy,0); lamp.add(head);
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(3.2,4,8,24), metalM);
  barrel.position.y=-5; barrel.castShadow=true; head.add(barrel);
  const grip = new THREE.Mesh(new THREE.CylinderGeometry(3.4,3.4,1.8,24), brassM);
  grip.position.y=-2.5; head.add(grip);
  const lens = new THREE.Mesh(new THREE.CylinderGeometry(3.7,3.7,0.8,24), glowM);
  lens.position.y=-8.6; head.add(lens);

  // light cast straight down onto the desk under the head
  const spot = new THREE.SpotLight(0xFFEAC6, 60, 120, Math.PI/4.5, 0.5, 1.3);
  spot.position.set(hx, hy-6, 0);
  spot.target.position.set(hx, -40, 4);
  spot.castShadow=true; spot.shadow.mapSize.set(1024,1024);
  lamp.add(spot, spot.target);
}
/* Clamp sits on the right edge of the desk (desk top y=0). The lamp-local y=0
   is the desk surface, so place the group there. */
lamp.position.set(70, 0, -6); scene.add(lamp);   // clamp-mounted architect lamp on the desk's right edge

/* ── Camera state machine ──────────────────────────────────────────── */
const orbit = { ...ORBIT0, target: new THREE.Vector3(0, 34, -2) };
let mode = 'orbit';
let anim = null;

function orbitPose() {
  // Camera height damped (0.5x) so the view can pitch up to the banner and
  // down to the desk without the camera flying to the ceiling. Aim maps phi
  // across its range: high phi -> desk, low phi -> banner. Tuned so the top
  // of the drag shows the banner and a little ceiling, never straight up.
  const s = new THREE.Spherical(orbit.radius, orbit.phi, orbit.theta);
  const p = new THREE.Vector3().setFromSpherical(s);
  const pos = new THREE.Vector3(
    orbit.target.x + p.x,
    orbit.target.y + p.y * 0.5,
    orbit.target.z + p.z
  );
  const t = (PHI_MAX - orbit.phi) / (PHI_MAX - PHI_MIN);   // 0 low, 1 high
  // Aim height still driven by phi (the up/down feel you liked). Aim x/z track
  // the pivot so cursor-directed zoom actually closes in on the hovered item.
  const look = new THREE.Vector3(orbit.target.x, 8 + t * 118, orbit.target.z);
  return { pos, look };
}
function focusPose() {
  const P = new THREE.Vector3();
  screenAnchor.getWorldPosition(P);
  const N = screenAnchor.localToWorld(new THREE.Vector3(0, 0, 1)).sub(P).normalize();
  const dist = (SCREEN_H / 2) / Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)) * 1.06;
  return { pos: P.clone().addScaledVector(N, dist), look: P };
}
function applyPose(p) {
  /* Hard fence: the camera cannot leave the room, and stops short of the
     bookshelves (which protrude to x = ±146) rather than pushing into them. */
  p.pos.x = clamp(p.pos.x, -140, 140);
  p.pos.y = clamp(p.pos.y, FLOOR_Y + 8, CEIL_Y - 8);
  p.pos.z = clamp(p.pos.z, WALL_BACK_Z + 8, WALL_FRONT_Z - 8);
  camera.position.copy(p.pos); camera.lookAt(p.look);
}
applyPose(orbitPose());

const catcher = document.getElementById('catcher');
const exitBtn = document.getElementById('exit');
const hint = document.getElementById('hint');
const HINT_ORBIT = 'DRAG — LOOK AROUND · CLICK THE LAPTOP — USE IT · CLICK THE ARM — OPEN THE SIMULATOR';

function goFocus() {
  if (mode !== 'orbit') return;
  mode = 'anim';
  const from = orbitPose(), to = focusPose(), t0 = performance.now();
  const DUR = matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 900;
  anim = { from, to, t0, DUR, after: () => {
    mode = 'focus';
    document.body.classList.add('focused');
    catcher.style.display = 'none';
    exitBtn.style.display = 'block';
  }};
}
function goOrbit() {
  if (mode !== 'focus') return;
  mode = 'anim';
  const from = focusPose(), to = orbitPose(), t0 = performance.now();
  const DUR = matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 700;
  exitBtn.style.display = 'none';
  document.body.classList.remove('focused');
  anim = { from, to, t0, DUR, after: () => {
    mode = 'orbit';
    catcher.style.display = 'block';
    hint.textContent = HINT_ORBIT;
  }};
}
exitBtn.addEventListener('click', goOrbit);

/* Certificate viewer: opens the clicked certificate over the scene with a
   clear back button, instead of a new browser tab. */
const certView = document.getElementById('certview');
const certImg  = document.getElementById('certimg');
function openCert(src) { certImg.src = src; certView.classList.add('open'); }
function closeCert() { certView.classList.remove('open'); certImg.src = ''; }
document.getElementById('certback').addEventListener('click', closeCert);
certView.addEventListener('click', e => { if (e.target === certView) closeCert(); });

addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (certView.classList.contains('open')) closeCert();
  else goOrbit();
});

/* ── Input ─────────────────────────────────────────────────────────── */
const ray = new THREE.Raycaster(), ndc = new THREE.Vector2();
let down = null, moved = 0;

const pick = e => {
  ndc.x = (e.clientX / innerWidth) * 2 - 1;
  ndc.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  if (ray.intersectObjects([armGroup], true).length) return 'arm';
  if (ray.intersectObjects([plate, plateBack], false).length) return 'plate';
  const cHit = ray.intersectObjects(certObjs, false)[0];
  if (cHit && cHit.object.userData.src) { pick.cert = cHit.object.userData.src; return 'cert'; }
  if (ray.intersectObjects([laptop, standBase, hole], true).length) return 'laptop';
  return null;
};

catcher.addEventListener('pointerdown', e => {
  catcher.setPointerCapture(e.pointerId);
  catcher.classList.add('grabbing');
  down = { x: e.clientX, y: e.clientY }; moved = 0;
});
catcher.addEventListener('pointermove', e => {
  if (mode !== 'orbit') return;
  if (down) {
    const dx = e.clientX - down.x, dy = e.clientY - down.y;
    moved = Math.max(moved, Math.hypot(dx, dy));
    orbit.theta = clamp(orbit.theta - dx * 0.005, THETA0 - THETA_RANGE, THETA0 + THETA_RANGE);
    orbit.phi = clamp(orbit.phi - dy * 0.004, PHI_MIN, PHI_MAX);
    down = { x: e.clientX, y: e.clientY };
    applyPose(orbitPose());
  } else {
    const t = pick(e);
    catcher.classList.toggle('hover', !!t);
    hint.textContent = t === 'arm'    ? 'ROBOTIC ARM PROTOTYPE — CLICK TO OPEN THE SIMULATOR'
                     : t === 'cert'   ? 'CERTIFICATE — CLICK TO OPEN FULL SIZE'
                     : t === 'plate'  ? 'NAMEPLATE — CLICK TO READ ABOUT ME'
                     : t === 'laptop' ? 'CLICK TO USE THE LAPTOP'
                     : HINT_ORBIT;
  }
});
const upHandler = e => {
  catcher.classList.remove('grabbing');
  if (down && moved < 5 && mode === 'orbit') {
    const t = pick(e);
    if (t === 'arm') { window.location.href = 'robot-sim.html'; }
    else if (t === 'cert') { openCert(pick.cert); }
    else if (t === 'plate') { window.location.href = 'index.html#about'; }
    else if (t === 'laptop') goFocus();
  }
  down = null;
};
catcher.addEventListener('pointerup', upHandler);
catcher.addEventListener('pointercancel', upHandler);
catcher.addEventListener('wheel', e => {
  if (mode !== 'orbit') return;
  e.preventDefault();

  const prev = orbit.radius;
  // Wider zoom range: get right up to the window/certs/arm, or pull back to
  // take in the room.
  orbit.radius = clamp(orbit.radius + e.deltaY * 0.05, 55, 250);   // pull back further from the window
  const zoomedIn = orbit.radius < prev;

  // CAD-style: when zooming IN, drift the pivot toward whatever the cursor is
  // over, so you close in on that item. When zooming OUT, ease back to centre.
  ndc.x = (e.clientX / innerWidth) * 2 - 1;
  ndc.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  const hit = ray.intersectObjects(
    [laptop, armGroup, plate, ...certObjs, deskTop, floor], true)[0];
  if (zoomedIn && hit) {
    // pull the pivot a fraction of the way toward the hovered point (x/z only,
    // so the vertical look behaviour you liked is untouched)
    orbit.target.x += (hit.point.x - orbit.target.x) * 0.12;
    orbit.target.z += (hit.point.z - orbit.target.z) * 0.12;
  } else if (!zoomedIn) {
    orbit.target.x += (0 - orbit.target.x) * 0.15;
    orbit.target.z += (-2 - orbit.target.z) * 0.15;
  }
  // keep the pivot from wandering too far so you can't push past the walls
  orbit.target.x = clamp(orbit.target.x, -70, 70);
  orbit.target.z = clamp(orbit.target.z, -30, 40);

  applyPose(orbitPose());
}, { passive: false });

/* ── Resize + loop ─────────────────────────────────────────────────── */
function resize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  glRenderer.setSize(innerWidth, innerHeight);
  cssRenderer.setSize(innerWidth, innerHeight);
}
addEventListener('resize', resize);
resize();

function loop(now) {
  if (anim) {
    const u = anim.DUR ? clamp((now - anim.t0) / anim.DUR, 0, 1) : 1;
    const e = u * u * (3 - 2 * u);
    applyPose({
      pos: anim.from.pos.clone().lerp(anim.to.pos, e),
      look: anim.from.look.clone().lerp(anim.to.look, e),
    });
    if (u >= 1) { const after = anim.after; anim = null; after(); }
  }
  glRenderer.render(scene, camera);
  cssRenderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

} catch (err) {
  console.error('[office] scene failed:', err);
  const f = document.getElementById('fail');
  f.style.display = 'flex';
  document.getElementById('failmsg').innerHTML =
    `3D VIEW FAILED TO BUILD\n\n${err.message}\n\n` +
    `<a href="index.html">Open the regular site instead →</a>\n\n` +
    `(DevTools → Console has the full stack.)`;
}
</script>
